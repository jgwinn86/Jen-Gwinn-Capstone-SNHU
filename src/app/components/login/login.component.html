<div class="login-container">
  <h2>Login</h2>

  <form #loginForm="ngForm" (ngSubmit)="onLogin()">
    <label>Username</label>
    <input 
      type="text" 
      [(ngModel)]="username" 
      name="username" 
      required 
    />

    <label>Password</label>
    <input 
      type="password" 
      [(ngModel)]="password" 
      name="password" 
      required 
    />

    <button type="submit">Login</button>

    <p *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </p>
  </form>
</div>
